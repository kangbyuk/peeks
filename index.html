<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PEEKS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="widget">
      <header class="top-bar">
        <div class="traffic-light-veil" aria-hidden="true"></div>
        <h1 class="brand-title">PEEKS</h1>
        <div class="top-right-tools">
          <span id="updated-at" class="updated-time">--:--</span>
          <button id="refresh-btn" class="icon-btn refresh-btn" type="button" data-i18n-aria="toolbar.refresh" aria-label="Refresh">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          </button>
          <button id="home-btn" class="icon-btn home-btn" type="button" data-i18n-aria="toolbar.home" aria-label="Home">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </button>
          <button id="toggle-rank-btn" class="icon-btn" type="button" data-i18n-aria="toolbar.rank" aria-label="Standings">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
          <button id="settings-btn" class="icon-btn" type="button" data-i18n-aria="toolbar.settings" aria-label="Settings">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <div class="widget-body">
      <section id="favorite-setup" class="favorite-setup hidden">

        <!-- 설정 탭 -->
        <div class="settings-tabs">
          <button class="settings-tab active" type="button" data-settings-tab="stealth" data-i18n="tab.stealth">🕵️ 몰래보기</button>
          <button class="settings-tab" type="button" data-settings-tab="teams" data-i18n="tab.teams">🏀 팀 관리</button>
          <button class="settings-tab" type="button" data-settings-tab="preferences" data-i18n="tab.general">⚙️ 기본 설정</button>
        </div>

        <!-- ① 몰래보기 패널 -->
        <div id="settings-panel-stealth" class="settings-panel">
          <div class="stealth-row">
            <span class="stealth-label" data-i18n="stealth.opacity">투명도</span>
            <input type="range" id="opacity-slider" class="opacity-slider" min="10" max="100" step="5" value="100" />
            <span id="opacity-val" class="stealth-val">100%</span>
          </div>
          <div class="stealth-row">
            <span class="stealth-label" data-i18n="stealth.ghost">고스트 모드</span>
            <span class="stealth-desc" data-i18n="stealth.ghostDesc">마우스 올릴 때만 선명하게</span>
            <label class="toggle-switch">
              <input type="checkbox" id="ghost-mode-cb" />
              <span class="toggle-thumb"></span>
            </label>
          </div>
          <div class="stealth-row">
            <span class="stealth-label" data-i18n="stealth.mono">모노크롬</span>
            <span class="stealth-desc" data-i18n="stealth.monoDesc">흑백 위장 (코더 모드 켜면 비활성)</span>
            <label class="toggle-switch">
              <input type="checkbox" id="mono-mode-cb" />
              <span class="toggle-thumb"></span>
            </label>
          </div>
          <div class="stealth-row">
            <span class="stealth-label" data-i18n="stealth.coder">코더 모드</span>
            <span class="stealth-desc" data-i18n="stealth.coderDesc">터미널 및 JSON 위장.</span>
            <label class="toggle-switch">
              <input type="checkbox" id="coder-mode-cb" />
              <span class="toggle-thumb"></span>
            </label>
          </div>
          <div id="coder-format-row" class="stealth-row coder-format-row hidden">
            <span class="stealth-label" data-i18n="stealth.outputFormat">출력 형식</span>
            <div class="coder-format-radios">
              <label class="coder-radio-label"
                ><input type="radio" name="coder-format" id="coder-format-log" value="log" checked /> <span data-i18n="stealth.formatLog">로그</span></label
              >
              <label class="coder-radio-label"
                ><input type="radio" name="coder-format" id="coder-format-code" value="code" /> <span data-i18n="stealth.formatCode">코드</span></label
              >
            </div>
          </div>
        </div>

        <!-- ② 기본 설정 (언어) -->
        <div id="settings-panel-preferences" class="settings-panel settings-panel--preferences hidden">
          <div class="stealth-row general-lang-row">
            <label class="stealth-label" for="locale-select" data-i18n="general.language">언어 설정</label>
            <select id="locale-select" class="locale-select" aria-label="Language">
              <option value="ko">한국어</option>
              <option value="en">English</option>
            </select>
          </div>
          <p class="general-lang-hint" data-i18n="general.languageHint">팀 이름·리그·종목 표기는 한국어 모드에서도 영어로 유지됩니다.</p>
        </div>

        <!-- ③ 팀 관리 탭 패널 (목록만 스크롤 · 하단 저장 버튼 고정) -->
        <div id="settings-panel-teams" class="settings-panel settings-panel--teams hidden">
          <div class="settings-teams-toolbar">
            <div class="sport-tabs">
              <button class="sport-tab active" data-sport="nba">🏀 NBA</button>
              <button class="sport-tab" data-sport="mlb">⚾ MLB</button>
              <button class="sport-tab" data-sport="soccer">⚽ Soccer</button>
            </div>
            <div class="team-search-wrap">
              <span class="team-search-icon">🔍</span>
              <input id="team-search-input" class="team-search-input" type="text" data-i18n-placeholder="teamSearch.placeholder" placeholder="Search teams..." autocomplete="off" spellcheck="false" />
              <button id="team-search-clear" class="team-search-clear hidden" type="button" data-i18n-aria="aria.clearSearch" aria-label="Clear">✕</button>
            </div>
          </div>
          <div class="settings-teams-scroll">
            <div id="nba-checkbox-list" class="team-checkbox-list sport-list"></div>
            <div id="mlb-checkbox-list" class="team-checkbox-list sport-list hidden"></div>
            <!-- Soccer: 리그별 서브탭 + 팀 목록 (목록만 세로 스크롤) -->
            <div id="soccer-setup-section" class="sport-list hidden">
              <div class="soccer-league-subtabs" id="soccer-setup-tabs">
                <button class="soccer-setup-tab active" data-league="eng.1">EPL</button>
                <button class="soccer-setup-tab" data-league="esp.1">LaLiga</button>
                <button class="soccer-setup-tab" data-league="ger.1">Bun.</button>
                <button class="soccer-setup-tab" data-league="ita.1">Serie A</button>
              </div>
              <div id="soccer-checkbox-list" class="team-checkbox-list"></div>
            </div>
          </div>
          <div class="settings-teams-footer">
            <button id="save-favorite-btn" type="button" class="btn-apply-favorites" data-i18n="btn.save">저장</button>
          </div>
        </div>
      </section>

      <section id="my-team-view" class="my-team-view hidden">
        <!-- Empty state: 관심 팀 없을 때 -->
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-state-emoji">🏟️</div>
          <p class="empty-state-text" data-i18n="empty.title">아직 응원하는 팀이 없네요!</p>
          <button id="empty-state-btn" class="empty-state-btn" type="button" data-i18n="empty.cta">+ 내 팀 등록하고 경기 보기</button>
        </div>

        <!-- My Teams -->
        <div id="my-teams-list" class="my-teams-list"></div>

        <!-- All Games (기본 펼침: 종목·리그 바 항상 노출, 아래만 로딩/결과) -->
        <div id="all-games-section" class="all-games-section open">
          <div class="all-games-header">
            <button id="all-games-toggle" class="all-games-toggle">
              <span class="all-games-title" data-i18n="allGames.title">ALL GAMES</span>
              <svg class="toggle-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="games-filter-tabs" id="games-filter-tabs">
              <button class="games-filter-btn active" data-games-sport="nba">🏀</button>
              <button class="games-filter-btn" data-games-sport="mlb">⚾</button>
              <button class="games-filter-btn" data-games-sport="soccer">⚽</button>
            </div>
          </div>
          <!-- Soccer 리그 서브탭 (⚽ 선택 시 항상 표시 — 데이터 유무와 무관) -->
          <div id="soccer-games-subtabs" class="soccer-games-subtabs hidden">
            <button class="soccer-games-tab active" data-league="eng.1">EPL</button>
            <button class="soccer-games-tab" data-league="esp.1">LaLiga</button>
            <button class="soccer-games-tab" data-league="ger.1">Bun.</button>
            <button class="soccer-games-tab" data-league="ita.1">Serie A</button>
            <button class="soccer-games-tab" data-league="uefa.champions">UCL</button>
          </div>
          <div id="all-games-list" class="all-games-list"></div>
        </div>
      </section>

      <section id="tables-view" class="tables-view hidden">
        <div class="standings-sport-tabs">
          <button class="standings-tab active" data-standings="nba">🏀 NBA</button>
          <button class="standings-tab" data-standings="mlb">⚾ MLB</button>
          <button class="standings-tab" data-standings="soccer">⚽</button>
        </div>
        <div id="mlb-sample-row" class="mlb-sample-row hidden" role="region" aria-label="MLB demo">
          <button type="button" id="mlb-sample-btn" class="mlb-sample-btn" data-i18n="mlb.sampleBtn">데모 순위 보기</button>
        </div>
        <!-- 축구 리그 서브탭 (⚽ 선택 시 표시) -->
        <div id="soccer-standings-subtabs" class="soccer-standings-subtabs hidden">
          <button class="soccer-std-tab active" data-league="eng.1">EPL</button>
          <button class="soccer-std-tab" data-league="esp.1">LaLiga</button>
          <button class="soccer-std-tab" data-league="ger.1">Bun.</button>
          <button class="soccer-std-tab" data-league="ita.1">Serie A</button>
          <button class="soccer-std-tab" data-league="uefa.champions">UCL</button>
        </div>

        <!-- NBA 순위 -->
        <div id="nba-tables" class="tables">
          <article class="panel">
            <h2 data-i18n="table.eastern">Eastern</h2>
            <table class="rank-table">
              <thead>
                <tr>
                  <th class="col-rank">#</th>
                  <th class="col-team" data-i18n="table.team">Team</th>
                  <th class="col-w">W</th>
                  <th class="col-l">L</th>
                  <th class="col-pct">PCT</th>
                </tr>
              </thead>
              <tbody id="east-body"></tbody>
            </table>
          </article>
          <article class="panel">
            <h2 data-i18n="table.western">Western</h2>
            <table class="rank-table">
              <thead>
                <tr>
                  <th class="col-rank">#</th>
                  <th class="col-team" data-i18n="table.team">Team</th>
                  <th class="col-w">W</th>
                  <th class="col-l">L</th>
                  <th class="col-pct">PCT</th>
                </tr>
              </thead>
              <tbody id="west-body"></tbody>
            </table>
          </article>
        </div>

        <!-- MLB 순위 (리그 → East/Central/West 지구별) -->
        <div id="mlb-tables" class="tables tables--mlb hidden">
          <article class="panel mlb-league-panel">
            <h2 data-i18n="table.american">American</h2>
            <div id="mlb-american-divisions" class="mlb-divisions-wrap"></div>
          </article>
          <article class="panel mlb-league-panel">
            <h2 data-i18n="table.national">National</h2>
            <div id="mlb-national-divisions" class="mlb-divisions-wrap"></div>
          </article>
        </div>

        <!-- Soccer 순위 (리그 공용) -->
        <div id="soccer-tables" class="tables hidden">
          <div class="epl-standings-wrap">
            <table class="rank-table epl-rank-table">
              <thead>
                <tr>
                  <th class="col-rank">#</th>
                  <th class="col-epl-logo"></th>
                  <th class="col-team" data-i18n="table.team">Team</th>
                  <th class="col-epl-num">W</th>
                  <th class="col-epl-num">D</th>
                  <th class="col-epl-num">L</th>
                  <th class="col-epl-pts" data-i18n="table.pts">Pts</th>
                </tr>
              </thead>
              <tbody id="soccer-standings-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <footer id="status" aria-live="polite"></footer>
      </div>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
